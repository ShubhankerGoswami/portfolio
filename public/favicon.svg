<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(210,100%,56%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(260,100%,65%);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(210,100%,56%);stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:hsl(260,100%,65%);stop-opacity:0.6" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="hsl(222,47%,6%)" />
  <!-- Gradient border -->
  <rect width="62" height="62" x="1" y="1" rx="13" fill="none" stroke="url(#border-grad)" stroke-width="1.5" />
  <!-- SG text -->
  <text
    x="32"
    y="43"
    font-family="Space Grotesk, Inter, sans-serif"
    font-size="26"
    font-weight="700"
    text-anchor="middle"
    fill="url(#grad)"
    letter-spacing="-1"
  >SG</text>
</svg>
